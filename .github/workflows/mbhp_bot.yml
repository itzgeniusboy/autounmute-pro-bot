name: 24x7 Bot Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 🔥 [CRITICAL FIX] Prevents multiple workflows from stacking up and crashing
concurrency:
  group: bot-runner-system
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Runtime Context Packages
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram==2.0.106 tgcrypto==1.2.5

      - name: Run Bot Node Engine
        run: python bot.py
